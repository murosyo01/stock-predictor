tickers:
  - AAPL
  - GOOGL
  - MSFT
  - AMZN
  - NVDA
  - META
  - TSLA

market_indices:
  - SPY
  - QQQ
  - "^VIX"

data:
  start_date: "2018-01-01"
  raw_dir: "data/raw"
  features_dir: "data/features"
  predictions_dir: "data/predictions"

features:
  ma_windows:
    - 5
    - 25
    - 60
  rsi_window: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  volatility_window: 20
  target_horizon: 5

model:
  test_ratio: 0.2
  n_estimators: 500
  learning_rate: 0.05
  num_leaves: 31
  min_child_samples: 50
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42
  model_dir: "models"

mlflow:
  experiment_name: "stock_prediction"
  tracking_uri: "mlruns"

backtest:
  initial_capital: 100000.0
  commission: 0.001

dl_model:
  seq_len: 30
  epochs: 50
  batch_size: 256
  patience: 10
  lstm:
    hidden_size: 128
    num_layers: 2
    dropout: 0.2
    lr: 0.001
  tcn:
    num_channels: [64, 64, 64]
    kernel_size: 3
    dropout: 0.2
    lr: 0.001
  patchtst:
    patch_len: 8
    stride: 4
    d_model: 128
    n_heads: 8
    n_layers: 3
    dropout: 0.1
    lr: 0.0005
  tft:
    d_model: 64
    n_heads: 4
    n_layers: 2
    dropout: 0.1
    lr: 0.0005
